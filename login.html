<!doctype html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Login Guru</title><link rel="stylesheet" href="style.css"></head><body class="auth-page"><main class="auth-card"><a href="index.html" class="back">← Kembali</a><div class="auth-icon">👨‍🏫</div><p class="eyebrow">PORTAL GURU</p><h1>Masuk ke Dashboard</h1><p class="muted">Gunakan akun guru yang dibuat di Supabase.</p><form id="form"><label>Email</label><input id="email" type="email" required><label>Password</label><input id="password" type="password" required><button id="btn">Masuk</button><p id="msg"></p></form></main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="supabase-config.js"></script><script>
form.onsubmit=async e=>{e.preventDefault();btn.disabled=true;btn.textContent="Memeriksa...";msg.textContent="";const{data,error}=await supabaseClient.auth.signInWithPassword({email:email.value.trim(),password:password.value});if(error){msg.className="error";msg.textContent="Email atau password salah.";btn.disabled=false;btn.textContent="Masuk";return}const{data:p}=await supabaseClient.from("profil_pengguna").select("peran").eq("id",data.user.id).single();if(p?.peran!=="guru"&&data.user.user_metadata?.role!=="guru"&&data.user.app_metadata?.role!=="guru"){await supabaseClient.auth.signOut();msg.className="error";msg.textContent="Akun ini bukan akun guru.";btn.disabled=false;btn.textContent="Masuk";return}location.href="guru.html"};</script></body></html>
