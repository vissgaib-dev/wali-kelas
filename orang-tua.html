<!doctype html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Portal Orang Tua</title><link rel="stylesheet" href="style.css"></head><body class="auth-page"><main class="auth-card"><a href="index.html" class="back">← Kembali</a><div class="auth-icon">👨‍👩‍👧</div><p class="eyebrow">PORTAL ORANG TUA</p><h1>Lihat Data Anak</h1><p class="muted">Masukkan NISN siswa yang terdaftar.</p><form id="form"><label>NISN Siswa</label><input id="nisn" inputmode="numeric" required><button id="btn">Lihat Data Anak</button><p id="msg"></p></form></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="supabase-config.js"></script><script>form.onsubmit=async e=>{e.preventDefault();btn.disabled=true;btn.textContent="Memeriksa...";msg.textContent="";const{data,error}=await supabaseClient.rpc("portal_orang_tua",{p_nisn:nisn.value.trim()});if(error||!data?.length){msg.className="error";msg.textContent="NISN tidak ditemukan.";btn.disabled=false;btn.textContent="Lihat Data Anak";return}sessionStorage.setItem("portalData",JSON.stringify(data[0]));location.href="portal-orang-tua.html"};</script></body></html>
