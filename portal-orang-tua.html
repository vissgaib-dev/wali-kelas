<!doctype html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Data Anak</title><link rel="stylesheet" href="style.css"></head><body class="portal"><main class="portal-wrap"><a href="orang-tua.html" class="back">← Keluar</a><header class="student-head"><div><p class="eyebrow">PORTAL ORANG TUA</p><h1 id="nama">Data Siswa</h1><p id="identitas"></p></div><div class="avatar">👨‍🎓</div></header><div class="stats"><article><span>📅</span><h2 id="hadir">0</h2><p>Total Hadir</p></article><article><span>🐷</span><h2 id="saldo">Rp0</h2><p>Saldo Tabungan</p></article><article><span>🧾</span><h2 id="bayar">Rp0</h2><p>Total Pembayaran</p></article></div><div class="panel"><h2>Informasi Anak</h2><p class="muted">Data ini hanya untuk dilihat. Orang tua tidak dapat mengubah data.</p><div id="detail"></div></div></main><script>
const d=JSON.parse(sessionStorage.getItem("portalData")||"null");if(!d)location.href="orang-tua.html";const rp=n=>new Intl.NumberFormat("id-ID",{style:"currency",currency:"IDR",maximumFractionDigits:0}).format(n||0);nama.textContent=d.nama;identitas.textContent=`Kelas ${d.kelas} • No. Absen ${d.nomor_absen}`;hadir.textContent=d.total_hadir||0;saldo.textContent=rp(d.saldo_tabungan);bayar.textContent=rp(d.total_pembayaran);detail.innerHTML=`<p><b>NIS:</b> ${d.nis||"-"}</p><p><b>NISN:</b> ${d.nisn}</p><p><b>Jenis Kelamin:</b> ${d.jenis_kelamin}</p>`;</script></body></html>
